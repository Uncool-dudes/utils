version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/uncool-dudes/utils

linters:
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - exhaustive
    - gocritic
    - govet
    - ineffassign
    - misspell
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unused

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam  # config structs passed by value at startup — copy cost is negligible
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-strings
        - name: increment-decrement

issues:
  exclude-rules:
    - path: _mock\.go$
      linters: [all]
