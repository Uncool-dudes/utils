version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/uncool-dudes/utils

linters:
  enable:
    - bodyclose
    - contextcheck
    - durationcheck
    - errcheck
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - thelper
    - tparallel
    - unparam
    - unused
    - wrapcheck

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam  # config structs passed by value at startup — copy cost is negligible
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-strings
        - name: increment-decrement
issues:
  exclude-rules:
    - path: _mock\.go$
      linters: [all]
    # Domain.Mark/Wrap/Wrapf/New/Newf/Combine ARE the wrapping layer, not unwrapped errors.
    # wrapcheck cannot be configured to recognise custom wrapping functions in golangci-lint v2.
    - linters: [wrapcheck]
      source: "Domain\\.(Mark|Wrap|Wrapf|New|Newf)|errors\\.Combine|c\\.cb\\.Execute|ctx\\.Err\\(\\)"
